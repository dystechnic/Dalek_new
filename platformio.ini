; ── Extra config (WiFi credentials - keep this file out of git!) ──
[platformio]
extra_configs = secrets.ini

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Serial monitor ────────────────────────────────────────────────
monitor_speed = 115200

; ── Filesystem ────────────────────────────────────────────────────
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv

; ── Libraries ─────────────────────────────────────────────────────
lib_deps =
    fastled/FastLED                     ; WS2811 eyestalk LED
    dfrobot/DFRobotDFPlayerMini         ; MP3 sound module
    gin66/FastAccelStepper              ; Hardware-timer stepper

; ── Build flags ───────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_ARCH_ESP32


lib_deps =
    fastled/FastLED @ ^3.7.0
    dfrobot/DFRobotDFPlayerMini @ ^1.0.6
    gin66/FastAccelStepper @ ^0.31.3