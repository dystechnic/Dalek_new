[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Serial monitor ────────────────────────────────────────────────
monitor_speed = 115200

; ── Libraries ─────────────────────────────────────────────────────
lib_deps =
    fastled/FastLED                     ; WS2811 eyestalk LED
    dfrobot/DFRobotDFPlayerMini         ; MP3 sound module
    gin66/FastAccelStepper              ; Hardware-timer stepper (replaces AccelStepper)

; ── Build flags ───────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0                ; set to 5 for verbose ESP-IDF logs
    -DARDUINO_ARCH_ESP32

; ── Extra config (WiFi credentials - keep this file out of git!) ──
extra_configs = secrets.ini